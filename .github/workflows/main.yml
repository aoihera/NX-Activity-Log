name: Release

on:
  workflow_dispatch:

jobs:
  build_and_release:
    name: Build and release
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
      - name: Get latest libnx commit hash
        id: libnx_hash
        run: |
          git config --global --add safe.directory "*"
          HASH=$(git ls-remote https://github.com/switchbrew/libnx.git HEAD | cut -f1)
          echo "hash=${HASH}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache libnx build
        id: cache_libnx
        uses: actions/cache@v5
        with:
          path: /opt/devkitpro/libnx
          key: libnx-${{ steps.libnx_hash.outputs.hash }}

      - name: Build and install libnx (if not cached)
        if: steps.cache_libnx.outputs.cache-hit != 'true'
        run: |
          git clone --recurse-submodules https://github.com/switchbrew/libnx.git
          cd libnx
          make install -j$(nproc)
        shell: bash

      - name: Checkout latest code
        uses: actions/checkout@v5
        with:
          ref: master
          clean: true
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Setup ENV parameters
        run: |
          VER_FILE=Application/Makefile
          VERSION=$(awk '/^VER_MAJOR/{print $3}' $VER_FILE).$(awk '/^VER_MINOR/{print $3}' $VER_FILE).$(awk '/^VER_MICRO/{print $3}' $VER_FILE)
          echo "TAG=v${VERSION}" > "${GITHUB_ENV}"
          echo "RELEASE_NAME=NX-Activity-Log v${VERSION}" >> "${GITHUB_ENV}"
        shell: bash

      - name: Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          make -j$(nproc)
        shell: bash

      - name: Upload NRO Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.RELEASE_NAME }}
          path: ./sdcard/switch/NX-Activity-Log/NX-Activity-Log.nro

      - name: Upload ELF Artifact (for crash debugging)
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.RELEASE_NAME }}-debug-elf
          path: ./Application/NX-Activity-Log.elf
